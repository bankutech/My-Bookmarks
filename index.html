<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Portal | Premium Dashboard</title>
    
    <!-- SEO & Metadata -->
    <meta name="description" content="A premium, personalized bookmark manager and productivity portal.">
    <meta name="theme-color" content="#020617">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <!-- Noise Texture -->
    <div class="noise-overlay"></div>

    <!-- Dynamic Background -->
    <div id="bg-canvas">
        <canvas id="particle-canvas"></canvas>
    </div>


    <div class="app-wrapper">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass">
            <div class="brand-area">
                <h1 class="brand-name">Nexus Portal</h1>
            </div>
            
            <nav class="nav-container">
                <ul class="nav-list">
                    <!-- Dynamic Nav Items -->
                </ul>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            
            <header class="header">
                <div class="header-top">
                    <div class="greeting-area">
                        <h1 class="greeting" id="greeting-text">Good Evening</h1>
                        <p class="sub-greeting">Your curated ecosystem for productivity and learning.</p>
                    </div>
                    <div id="digital-clock" class="clock-container glass">
                        <div class="time" id="clock-time">00:00:00</div>
                        <div class="date" id="clock-date">Monday, January 1</div>
                    </div>
                </div>
                
                <div class="search-container">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="search-input" class="search-input glass" placeholder="Search resources or documents...">
                </div>
            </header>

            <!-- Grid Content -->
            <div id="categories-container">
                <!-- Dynamic Sections -->
            </div>

            <!-- Add Bookmark FAB -->
            <button id="add-bookmark-btn" class="fab glass" title="Add Bookmark">
                <i class="fa-solid fa-plus"></i>
            </button>

            <div id="bookmark-modal" class="modal-overlay">
                <div class="modal-content glass">
                    <h3 id="modal-title">Add New Resource</h3>
                    <input type="hidden" id="edit-index" value="-1">
                    <div class="input-group">
                        <label>Name</label>
                        <input type="text" id="bm-name" placeholder="e.g. My Portfolio">
                    </div>
                    <div class="input-group">
                        <label>URL</label>
                        <input type="text" id="bm-url" placeholder="https://...">
                    </div>
                    <div class="input-group">
                        <label>Category</label>
                        <select id="bm-category">
                            <option value="academic">Academic</option>
                            <option value="dev">Development</option>
                            <option value="video">Video Learning</option>
                            <option value="platforms">Platforms</option>
                            <option value="compilers">Compilers</option>
                            <option value="docs">Docs</option>
                            <option value="utils">Utilities</option>
                            <option value="projects">My Active Projects</option>
                        </select>
                    </div>
                    <div class="modal-actions">
                        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                        <button class="btn btn-primary" id="save-btn" onclick="saveBookmark()">Save Bookmark</button>
                    </div>
                </div>
            </div>

            <footer style="margin-top: 4rem; padding-bottom: 2rem; color: var(--text-secondary); font-size: 0.9rem; text-align: center;">
                <p>&copy; 2024 Nexus Portal. Designed for excellence.</p>
            </footer>
        </main>
    </div>

    <!-- Scripts -->
    <script src="./js/data.js"></script>
    <script src="./js/scripts.js"></script>
</body>
</html>
